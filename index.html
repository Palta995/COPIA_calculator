<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Money Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial;
    color: white;
}

/* กล่องกลาง */
.container {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    width: 300px;
    text-align: center;
}

/* หัวข้อ */
h1 {
    margin-bottom: 20px;
}

/* ช่อง input */
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 15px;
}

/* ปุ่ม */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    color: white;
    transform: scale(1.05);
}

/* ผลลัพธ์ */
.result {
    margin-top: 20px;
    text-align: left;
    line-height: 1.8;
    font-size: 15px;
}
</style>

</head>

<body>

<div class="container">
    <h1>💰 คำนวณเงิน</h1>

    <input type="number" id="money" placeholder="ใส่จำนวนเงิน">

    <button onclick="calc()">คำนวณ</button>

    <div class="result" id="result"></div>
</div>

<script>
function calc() {
    let m = parseFloat(document.getElementById("money").value);

    if (isNaN(m)) {
        document.getElementById("result").innerHTML = "⚠️ กรุณาใส่ตัวเลข";
        return;
    }

    let m1 = m - (m * 0.25);
    let m2 = m1 - (m1 * 0.15);
    let r = m2 / 2;
    let j = r / 2;

    document.getElementById("result").innerHTML = `
        💸 หัก 25%: ${m1.toFixed(2)} บาท <br>
        🏢 หัก 15%: ${m2.toFixed(2)} บาท <br>
        👤 ริว: ${r.toFixed(2)} บาท <br>
        🧑 เจ: ${j.toFixed(2)} บาท <br>
        🧑 ฟิว: ${j.toFixed(2)} บาท
    `;
}
</script>

</body>
</html>
